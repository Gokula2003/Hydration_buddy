version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: hydration_buddy_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hydration_buddy
      MYSQL_ROOT_PASSWORD: root_password_change_me
      MYSQL_USER: hydration_user
      MYSQL_PASSWORD: hydration_password_change_me
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - hydration_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Laravel Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydration_buddy_app
    restart: unless-stopped
    environment:
      - APP_NAME=HydrationBuddy
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=hydration_buddy
      - DB_USERNAME=hydration_user
      - DB_PASSWORD=hydration_password_change_me
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - hydration_network
    command: >
      sh -c "
        php artisan config:cache &&
        php artisan route:cache &&
        php artisan view:cache &&
        php artisan migrate --force &&
        /usr/bin/supervisord -c /etc/supervisord.conf
      "

networks:
  hydration_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
