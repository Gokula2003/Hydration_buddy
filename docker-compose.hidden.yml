# ⚠️ IMPORTANT: Rename this file for local Docker development
# 
# FOR LOCAL DEVELOPMENT:
#   Rename: docker-compose.hidden.yml → docker-compose.yml
#   Then run: docker-compose up -d
#
# FOR RENDER DEPLOYMENT:
#   Keep this file as docker-compose.hidden.yml
#   Render will use the Dockerfile instead
#
# This file is hidden to prevent Render from trying to use it

version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hydration_buddy_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: hydration_buddy
      MYSQL_ROOT_PASSWORD: root_password_change_me
      MYSQL_USER: hydration_user
      MYSQL_PASSWORD: hydration_password_change_me
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - hydration_network

  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: hydration_buddy_app
    restart: unless-stopped
    environment:
      - APP_NAME=HydrationBuddy
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://localhost
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=hydration_buddy
      - DB_USERNAME=hydration_user
      - DB_PASSWORD=hydration_password_change_me
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    ports:
      - "8080:80"
    depends_on:
      - mysql
    networks:
      - hydration_network

networks:
  hydration_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
